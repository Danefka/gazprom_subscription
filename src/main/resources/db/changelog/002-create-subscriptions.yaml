databaseChangeLog:
  - changeSet:
      id: 002-create-subscriptions
      author: danefka
      changes:
        - createTable:
            tableName: subscriptions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: service_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: tariff_name
                  type: VARCHAR(255)

              - column:
                  name: price
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: end_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            constraintName: fk_subscriptions_user
            baseTableName: subscriptions
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id