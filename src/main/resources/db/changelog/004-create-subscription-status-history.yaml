databaseChangeLog:
  - changeSet:
      id: 004-create-subscription-status-history
      author: danefka
      changes:
        - createTable:
            tableName: subscription_status_history
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: subscription_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: old_status
                  type: varchar(50)

              - column:
                  name: new_status
                  type: varchar(50)
                  constraints:
                    nullable: false

              - column:
                  name: reason
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: changed_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: subscription_status_history
            baseColumnNames: subscription_id
            referencedTableName: subscriptions
            referencedColumnNames: id
            constraintName: fk_subscription_status_history_subscription
            onDelete: CASCADE